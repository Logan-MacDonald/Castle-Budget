services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-castle_budget}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Binds to loopback only — not reachable from LAN. Needed for
      # host-side tooling (prisma migrate, vitest) on the dev VM.
      # Host port 5433 because dev VM already has a system postgres on 5432.
      - "127.0.0.1:5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # postgres entrypoint runs as root, fixes data-dir ownership, then
    # setuid()s to the postgres user. These caps are the minimum set for
    # that handoff.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-castle_budget}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
      MEMBER_SEED_PASSWORD: ${MEMBER_SEED_PASSWORD}
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      WEB_ORIGIN: http://${APP_DOMAIN:-budget.home}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Tailscale sidecar: joins the stack to the user's tailnet. Shares its
  # network namespace with the edge nginx (see nginx.network_mode below),
  # so the app is reachable via the tailnet IP/MagicDNS AND via the host
  # LAN port 80 (mapped here, not on nginx).
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TAILSCALE_HOSTNAME:-castle-budget}
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      # Don't take over container DNS — we still need Docker's internal
      # DNS to resolve `api`, `web`, etc. on the `internal` network.
      TS_EXTRA_ARGS: --accept-dns=false
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    ports:
      - "80:80"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "tailscale status --peers=false >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # tailscaled needs NET_ADMIN + NET_RAW for tun/wireguard; SYS_MODULE
    # is intentionally NOT added (no kernel module loading from the
    # container).
    cap_add:
      - NET_ADMIN
      - NET_RAW

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    # Share the tailscale sidecar's network namespace so binding 80 inside
    # exposes the app on both the tailnet and (via tailscale's port map)
    # the LAN.
    network_mode: "service:tailscale"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # nginx master forks workers and drops them to the nginx user; bind to
    # the privileged port 80 requires NET_BIND_SERVICE.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE

volumes:
  pg_data:
  tailscale_state:

networks:
  internal:
    driver: bridge
