version: '3.9'

services:
  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/castle-budget.db
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      WEB_ORIGIN: http://${APP_DOMAIN:-budget.home}
    volumes:
      - db_data:/data
    networks:
      - internal

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
    driver: bridge
